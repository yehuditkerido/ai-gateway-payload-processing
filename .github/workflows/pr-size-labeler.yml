name: PR Size Labeler

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  size-label:
    runs-on: ubuntu-latest
    steps:
      - name: size-label
        id: size
        uses: pascalgn/size-label-action@56b489b027932ec0cf60438a1a5f1a19c8fc71ff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IGNORED: |
            go.sum
            go.mod
            *.generated.go
            vendor/**
        with:
          sizes: >
            {
              "0": "XS",
              "10": "S",
              "30": "M",
              "100": "L",
              "500": "XL",
              "1000": "XXL"
            }

      - name: Hold large PRs
        if: contains(steps.size.outputs.sizeLabel, 'XL')
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const marker = '<!-- pr-size-labeler-comment -->';
            const body = [
              marker,
              '⚠️ **Large PR detected**',
              '',
              'Your PR is large. Please consider breaking it into multiple PRs.',
              '',
              'The `do-not-merge/hold` label has been added and can be removed by the reviewers based on their judgement.'
            ].join('\n');

            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['do-not-merge/hold'] });

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
