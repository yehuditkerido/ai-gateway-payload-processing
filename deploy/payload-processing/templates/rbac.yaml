{{- $bbr := .Values.upstreamBbr.bbr }}
{{- if $bbr.multiNamespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-externalmodels-reader
rules:
  # apikey-injection plugin: watches labeled Secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # model-provider-resolver plugin: watches ExternalModel CRD
  - apiGroups: ["maas.opendatahub.io"]
    resources: ["externalmodels"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-externalmodels-reader
subjects:
- kind: ServiceAccount
  name: {{ $bbr.name }}-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-externalmodels-reader
{{- else }} ## if bbr is set in a single namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-externalmodels-reader
  namespace: {{ .Release.Namespace }}
rules:
  # apikey-injection plugin: watches labeled Secrets
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  # model-provider-resolver plugin: watches ExternalModel CRD
  - apiGroups: ["maas.opendatahub.io"]
    resources: ["externalmodels"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-externalmodels-reader
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: {{ $bbr.name }}-{{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-externalmodels-reader
{{- end }}
